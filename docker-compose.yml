services:
  db:
    image: postgres:16-alpine
    container_name: xprinter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xprinter
      POSTGRES_USER: xprinter
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xprinter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xprinter-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  xprinter:
    build: .
    container_name: xprinter-server
    ports:
      - "${PORT:-9090}:9000"
    volumes:
      - xprinter_data:/data
      - xprinter_media:/app/media
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - PYTHONUNBUFFERED=1
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - DB_NAME=${DB_NAME:-xprinter}
      - DB_USER=${DB_USER:-xprinter}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-https://printer.nonbor.uz,https://admin.nonbor.uz}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/v2/health/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  xprinter_data:
  xprinter_media:
