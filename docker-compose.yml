services:
  xprinter:
    build: .
    container_name: xprinter-server
    ports:
      - "${PORT:-9090}:9000"
    volumes:
      - xprinter_data:/data
      - ./db.sqlite3:/app/db.sqlite3
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - PYTHONUNBUFFERED=1
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-xprinter-prod-secret-key-change-me}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}

volumes:
  xprinter_data:
