services:
  xprinter:
    build: .
    container_name: xprinter-server
    ports:
      - "9000:9000"
      - "9090:9000"
    volumes:
      - xprinter_data:/data
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - PYTHONUNBUFFERED=1
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY .env da o'rnatilishi shart}
      - XPRINTER_API_KEY=${XPRINTER_API_KEY:?XPRINTER_API_KEY .env da o'rnatilishi shart}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET .env da o'rnatilishi shart}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}

volumes:
  xprinter_data:
