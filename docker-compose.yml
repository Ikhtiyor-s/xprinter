services:
  xprinter:
    build: .
    container_name: xprinter-server
    ports:
      - "9000:9000"
    volumes:
      - xprinter_data:/data
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - PYTHONUNBUFFERED=1
      - DB_PATH=/data/xprinter.sqlite3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/v2/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  xprinter_data:
